<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vintage Journal</title>
<style>
  :root {
    --paper-color: #f5f1e8;
    --ink-color: #3a3226;
    --dark-ink: #1a1612;
    --border-color: #c9c0b0;
    --old-text-color: #8b7355;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Times New Roman', Times, serif;
    background-color: #e8e4dc;
    background-image: radial-gradient(rgba(139, 90, 43, 0.08) 1px, transparent 1px), linear-gradient(45deg, rgba(210,195,170,0.3) 25%, transparent 25%, transparent 75%, rgba(210,195,170,0.3) 75%);
    background-size: 20px 20px, 40px 40px;
    color: var(--ink-color);
    min-height: 100vh;
  }

  .hidden { display: none !important; }

  /* ================= 登录页 ================= */
  .auth-container { max-width: 450px; margin: 80px auto; background: var(--paper-color); border: 1px solid var(--border-color); padding: 50px 40px; box-shadow: 0 10px 40px rgba(58, 50, 38, 0.15); text-align: center; }
  .auth-title { font-family: 'Courier New', Courier, monospace; font-size: 2.2em; letter-spacing: 6px; color: var(--dark-ink); margin-bottom: 10px; text-transform: uppercase; }
  .auth-subtitle { font-style: italic; color: #888; margin-bottom: 40px; }
  .auth-form input { width: 100%; padding: 15px 20px; margin-bottom: 20px; background: #fffdf7; border: 2px dashed var(--border-color); font-family: 'Courier New', Courier, monospace; font-size: 1.1em; outline: none; box-sizing: border-box; }
  .auth-btn { width: 100%; padding: 18px; background: var(--dark-ink); color: var(--paper-color); border: none; font-family: 'Courier New', Courier, monospace; font-size: 1.2em; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; }
  .auth-switch { margin-top: 30px; font-size: 0.95em; }
  .auth-switch a { color: #8b5a2b; text-decoration: underline; cursor: pointer; font-weight: bold; }
  .error-message { color: #a94442; background: #f2dede; border: 1px solid #ebccd1; padding: 10px; margin-bottom: 20px; font-family: 'Courier New', Courier, monospace; display: none; }

  /* ================= 主应用 ================= */
  .main-wrapper { padding: 40px 20px; max-width: 1600px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 40px; position: relative; }
  .header h1 { font-family: 'Courier New', Courier, monospace; font-size: 2.8em; letter-spacing: 8px; color: var(--dark-ink); margin: 0; text-transform: uppercase; }
  .user-info { position: absolute; top: 10px; right: 10px; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; }
  .logout-btn { background: none; border: 1px solid var(--border-color); color: #666; padding: 5px 10px; margin-left: 10px; cursor: pointer; }

  /* ================= Dashboard ================= */
  .dashboard { display: flex; justify-content: center; align-items: center; gap: 60px; min-height: 60vh; padding: 40px; background: var(--paper-color); border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(58, 50, 38, 0.15); }
  .dashboard-card { width: 320px; height: 400px; perspective: 1000px; cursor: pointer; }
  .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
  .dashboard-card:hover .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid var(--border-color); background: #fffdf7; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
  .card-front { font-family: 'Courier New', Courier, monospace; font-size: 2em; letter-spacing: 4px; text-transform: uppercase; color: var(--dark-ink); }
  .card-front::before { content: '✍️'; font-size: 3rem; margin-bottom: 20px; opacity: 0.7; }
  .card-front.memories::before { content: '📷'; }
  .card-back { transform: rotateY(180deg); padding: 20px; font-size: 1.1em; line-height: 1.6; color: #555; }

  /* ================= 编辑器 & 详情页 ================= */
  .editor-page { background: var(--paper-color); padding: 40px; border: 1px solid var(--border-color); }
  .back-btn { font-family: 'Courier New', Courier, monospace; background: none; border: 1px solid var(--border-color); padding: 10px 20px; cursor: pointer; margin-bottom: 30px; }
  .editor-layout { display: flex; gap: 30px; }
  .editor-panel { flex: 1.2; display: flex; flex-direction: column; gap: 25px; }
  .input-group label { font-family: 'Courier New', Courier, monospace; font-weight: bold; text-transform: uppercase; font-size: 0.85em; letter-spacing: 2px; display: block; margin-bottom: 10px; }
  .date-input, .content-textarea { width: calc(100% - 24px); padding: 15px; background: #fffdf7; border: 2px dashed var(--border-color); font-family: inherit; font-size: 1.1em; outline: none; }
  .content-textarea { height: 400px; resize: vertical; }
  .upload-area { border: 2px dashed var(--border-color); padding: 30px; text-align: center; background: #fcfbf7; cursor: pointer; }
  .btn-save { background: #3a3226; color: #f5f1e8; border: none; padding: 15px 40px; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; text-transform: uppercase; cursor: pointer; align-self: flex-start; margin-right: 10px; }
  .btn-reedit { background: #8b5a2b; color: #fff; border: none; padding: 15px 40px; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; text-transform: uppercase; cursor: pointer; align-self: flex-start; }

  /* ================= Memories 页面 ================= */
  .memories-page { background: var(--paper-color); padding: 40px; border: 1px solid var(--border-color); min-height: 80vh; }
  .memories-container { display: flex; gap: 30px; height: calc(100vh - 200px); }
  .diary-timeline { flex: 1; overflow-y: auto; padding-right: 20px; border-right: 1px dashed var(--border-color); }
  .timeline-item { padding: 20px; border-bottom: 1px dotted var(--border-color); cursor: pointer; transition: background 0.2s; }
  .timeline-item:hover { background: #f0ece3; }
  .timeline-date { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: var(--dark-ink); }
  .timeline-snippet { font-size: 0.9em; color: #666; margin-top: 5px; }
  .photo-gallery-sidebar { flex: 1; overflow-y: auto; padding-left: 20px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
  .gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.3s; }
  .gallery-img:hover { transform: scale(1.05); }

  /* ================= 弹窗遮罩 ================= */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
    z-index: 1000; padding: 20px;
  }
  .modal-content {
    background: var(--paper-color); width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto;
    padding: 40px; border: 1px solid var(--border-color); position: relative;
  }
  .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 2em; cursor: pointer; color: var(--ink-color); }

  /* 只读样式 */
  .readonly-text { color: var(--old-text-color); font-style: italic; border: none !important; background: transparent !important; cursor: default; }
  
  /* ================= 图片预览弹窗特殊样式 ================= */
  .image-preview-modal .modal-content { max-width: 700px; text-align: center; }
  .preview-img { max-width: 100%; max-height: 60vh; border: 5px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
  .image-actions { margin-top: 20px; }
  .btn-reupload { background: #8b5a2b; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-family: 'Courier New'; text-transform: uppercase; }

</style>
</head>
<body>

<!-- ================= 登录页 ================= -->
<div id="authPage" class="auth-container">
  <div class="auth-title">Journal</div>
  <div class="auth-subtitle" id="authSubtitle">Welcome Back</div>
  <div class="error-message" id="errorMessage"></div>
  <form class="auth-form" id="authForm" onsubmit="handleAuth(event)">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" class="auth-btn" id="authButton">Sign In</button>
  </form>
  <div class="auth-switch">
    <span id="switchText">Don't have an account?</span>
    <a id="switchLink" onclick="toggleAuthMode()">Sign Up</a>
  </div>
</div>

<!-- ================= 主应用 ================= -->
<div id="mainApp" class="main-wrapper hidden">
  <div class="header">
    <div class="user-info">
      Welcome, <strong id="currentUser"></strong>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <h1>Vintage Journal</h1>
  </div>

  <!-- Dashboard -->
  <div id="dashboardPage" class="dashboard">
    <div class="dashboard-card" onclick="showPage('editorPage')">
      <div class="card-inner"><div class="card-front">New Diary</div><div class="card-back">Capture today's thoughts.</div></div>
    </div>
    <div class="dashboard-card" onclick="showPage('memoriesPage')">
      <div class="card-inner"><div class="card-front memories">Memories</div><div class="card-back">Browse past entries.</div></div>
    </div>
  </div>

  <!-- 新建日记页 -->
  <div id="editorPage" class="editor-page hidden">
    <button class="back-btn" onclick="showPage('dashboardPage')">← Back to Home</button>
    <div class="editor-layout">
      <div class="editor-panel">
        <div class="input-group"><label for="entryDate">Date</label><input type="date" id="entryDate" class="date-input"></div>
        <div class="input-group"><label for="entryContent">Today's Entry</label><textarea id="entryContent" class="content-textarea" placeholder="Pour out your heart..."></textarea></div>
        <div class="input-group">
          <label>Attachments</label>
          <div class="upload-area" onclick="document.getElementById('imageUpload').click()">
            <input type="file" id="imageUpload" accept="image/*" multiple>
            <span>Click to upload images</span>
          </div>
        </div>
        <button class="btn-save" onclick="saveEntry()">Save Entry</button>
      </div>
    </div>
  </div>

  <!-- Memories 页面 -->
  <div id="memoriesPage" class="memories-page hidden">
    <button class="back-btn" onclick="showPage('dashboardPage')">← Back to Home</button>
    <h2 style="font-family: 'Courier New', Courier, monospace; text-transform: uppercase;">Your Timeline</h2>
    <div class="memories-container">
      <div class="diary-timeline" id="diaryTimeline"></div>
      <div class="photo-gallery-sidebar">
        <h3 style="font-family: 'Courier New', Courier, monospace;">Photo Gallery</h3>
        <div class="gallery-grid" id="memoriesGallery"></div>
      </div>
    </div>
  </div>
</div>

<!-- ================= 日记详情弹窗 ================= -->
<div id="diaryDetailModal" class="modal-overlay hidden">
  <div class="modal-content">
    <button class="close-modal" onclick="closeModal('diaryDetailModal')">&times;</button>
    <div class="editor-layout">
      <div class="editor-panel">
        <div class="input-group"><label>Date</label><input type="date" id="detailDate" class="date-input" disabled></div>
        <div class="input-group"><label>Content</label><textarea id="detailContent" class="content-textarea" readonly></textarea></div>
        <div>
          <button id="reeditBtn" class="btn-reedit" onclick="enterReEditMode()">Re-edit</button>
          <button id="saveChangesBtn" class="btn-save hidden" onclick="saveChanges()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ================= 图片预览弹窗 ================= -->
<div id="imagePreviewModal" class="modal-overlay image-preview-modal hidden">
  <div class="modal-content">
    <button class="close-modal" onclick="closeModal('imagePreviewModal')">&times;</button>
    <img id="previewImage" class="preview-img" src="" alt="Preview">
    <div class="image-actions">
      <input type="file" id="reuploadInput" accept="image/*" style="display:none;">
      <button class="btn-reupload" onclick="document.getElementById('reuploadInput').click()">Re-upload Image</button>
    </div>
  </div>
</div>

<script>
  // ================= IndexedDB 数据库管理 =================
  const DB_NAME = 'VintageJournalDB';
  const DB_VERSION = 1;
  let db;

  function initDB() {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    
    request.onupgradeneeded = (event) => {
      db = event.target.result;
      if (!db.objectStoreNames.contains('users')) {
        db.createObjectStore('users', { keyPath: 'username' });
      }
      if (!db.objectStoreNames.contains('diaries')) {
        const diaryStore = db.createObjectStore('diaries', { keyPath: 'id', autoIncrement: true });
        diaryStore.createIndex('username_date', ['username', 'date'], { unique: false });
      }
      if (!db.objectStoreNames.contains('photos')) {
        const photoStore = db.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
        photoStore.createIndex('username', 'username', { unique: false });
      }
    };

    request.onsuccess = (event) => {
      db = event.target.result;
    };

    request.onerror = (event) => {
      console.error("Database error:", event.target.error);
    };
  }

  // ================= 全局状态 =================
  let currentUser = null;
  let userDiaries = [];
  let userPhotos = [];
  let isLoginMode = true;
  let currentEditingDiaryId = null;
  let currentEditingPhotoId = null;

  // ================= 初始化 =================
  document.addEventListener('DOMContentLoaded', () => {
    initDB();
    const loggedInUser = localStorage.getItem('journal_currentUser');
    if (loggedInUser) {
      initApp(loggedInUser);
    } else {
      showAuthPage();
    }
    document.getElementById('reuploadInput')?.addEventListener('change', handleReupload);
  });

  // ================= 认证系统 =================
  function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('authSubtitle').textContent = isLoginMode ? 'Welcome Back' : 'Create Account';
    document.getElementById('authButton').textContent = isLoginMode ? 'Sign In' : 'Sign Up';
    document.getElementById('switchText').textContent = isLoginMode ? "Don't have an account?" : "Already have an account?";
    document.getElementById('switchLink').textContent = isLoginMode ? 'Sign Up' : 'Sign In';
    document.getElementById('errorMessage').style.display = 'none';
  }

  function handleAuth(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    
    const transaction = db.transaction(['users'], 'readwrite');
    const store = transaction.objectStore('users');

    if (isLoginMode) {
      store.get(username).onsuccess = (e) => {
        const user = e.target.result;
        if (user && user.password === simpleHash(password)) {
          initApp(username);
        } else {
          showError('Invalid username or password.');
        }
      };
    } else {
      store.get(username).onsuccess = (e) => {
        if (e.target.result) {
          showError('Username already exists.');
        } else {
          store.add({ username, password: simpleHash(password), createdAt: new Date().toISOString() });
          initApp(username);
        }
      };
    }
  }

  function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      const char = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
      hash = hash & hash;
    }
    return hash.toString();
  }

  function initApp(username) {
    currentUser = username;
    localStorage.setItem('journal_currentUser', username);
    document.getElementById('currentUser').textContent = username;
    document.getElementById('authPage').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    showPage('dashboardPage');
    document.getElementById('entryDate').valueAsDate = new Date();
    loadAllData();
  }

  function logout() {
    localStorage.removeItem('journal_currentUser');
    location.reload();
  }

  function showError(msg) {
    const el = document.getElementById('errorMessage');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ================= 数据加载 =================
  function loadAllData() {
    loadDiaries();
    loadPhotos();
  }

  function loadDiaries() {
    if (!db) return;
    const transaction = db.transaction(['diaries'], 'readonly');
    const store = transaction.objectStore('diaries');
    const index = store.index('username_date');
    const request = index.getAll(IDBKeyRange.bound([currentUser, ''], [currentUser, '\uffff']));
    
    request.onsuccess = (e) => {
      userDiaries = e.target.result.sort((a,b) => new Date(b.date) - new Date(a.date));
      renderMemories();
    };
  }

  function loadPhotos() {
    if (!db) return;
    const transaction = db.transaction(['photos'], 'readonly');
    const store = transaction.objectStore('photos');
    const index = store.index('username');
    const request = index.getAll(currentUser);
    
    request.onsuccess = (e) => {
      userPhotos = e.target.result;
      renderMemories();
    };
  }

  // ================= 页面路由 =================
  function showPage(pageId) {
    ['dashboardPage', 'editorPage', 'memoriesPage'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'memoriesPage') renderMemories();
  }

  // ================= Memories 渲染 =================
  function renderMemories() {
    const timelineEl = document.getElementById('diaryTimeline');
    const galleryEl = document.getElementById('memoriesGallery');
    
    if (userDiaries.length === 0) {
      timelineEl.innerHTML = '<p style="text-align:center; color:#999;">No diaries yet.</p>';
    } else {
      timelineEl.innerHTML = userDiaries.map(d => `
        <div class="timeline-item" onclick="openDiaryDetail(${d.id})">
          <div class="timeline-date">${d.date}</div>
          <div class="timeline-snippet">${d.content.substring(0, 100)}...</div>
        </div>
      `).join('');
    }

    if (userPhotos.length === 0) {
      galleryEl.innerHTML = '<p style="color:#999;">No photos yet.</p>';
    } else {
      galleryEl.innerHTML = userPhotos.map(p => `
        <img src="${p.src}" class="gallery-img" onclick="openImagePreview(${p.id})" alt="Memory">
      `).join('');
    }
  }

  // ================= 日记详情逻辑 =================
  function openDiaryDetail(id) {
    const diary = userDiaries.find(d => d.id == id); // 使用 == 兼容类型
    if (!diary) return;

    currentEditingDiaryId = id; // 保存ID
    document.getElementById('detailDate').value = diary.date;
    document.getElementById('detailContent').value = diary.content;
    document.getElementById('detailContent').className = 'content-textarea readonly-text';
    document.getElementById('detailContent').readOnly = true;
    
    document.getElementById('reeditBtn').classList.remove('hidden');
    document.getElementById('saveChangesBtn').classList.add('hidden');

    document.getElementById('diaryDetailModal').classList.remove('hidden');
  }

  function enterReEditMode() {
    const textarea = document.getElementById('detailContent');
    textarea.readOnly = false;
    textarea.className = 'content-textarea';
    document.getElementById('reeditBtn').classList.add('hidden');
    document.getElementById('saveChangesBtn').classList.remove('hidden');
  }

  function saveChanges() {
    const newContent = document.getElementById('detailContent').value;
    const date = document.getElementById('detailDate').value;

    const transaction = db.transaction(['diaries'], 'readwrite');
    const store = transaction.objectStore('diaries');
    
    const updatedDiary = {
      id: Number(currentEditingDiaryId), // 强制转为数字，解决Bug的关键
      username: currentUser,
      date: date,
      content: newContent,
      updatedAt: new Date().toISOString()
    };

    const request = store.put(updatedDiary);
    
    request.onsuccess = () => {
      closeModal('diaryDetailModal');
      loadDiaries(); // 重新加载数据
      alert('Changes saved!');
    };

    request.onerror = () => {
      alert('Failed to save changes. Please try again.');
    };
  }

  // ================= 图片逻辑 =================
  function openImagePreview(photoId) {
    const photo = userPhotos.find(p => p.id == photoId);
    if (!photo) return;

    currentEditingPhotoId = photoId;
    document.getElementById('previewImage').src = photo.src;
    document.getElementById('imagePreviewModal').classList.remove('hidden');
  }

  function handleReupload(event) {
    const file = event.target.files[0];
    if (!file || !currentEditingPhotoId) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const transaction = db.transaction(['photos'], 'readwrite');
      const store = transaction.objectStore('photos');
      
      const updatedPhoto = {
        id: Number(currentEditingPhotoId), // 强制转为数字
        username: currentUser,
        src: e.target.result,
        date: new Date().toLocaleDateString(),
        updatedAt: new Date().toISOString()
      };

      store.put(updatedPhoto);
      transaction.oncomplete = () => {
        document.getElementById('previewImage').src = e.target.result;
        loadPhotos();
      };
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  document.getElementById('imageUpload')?.addEventListener('change', (event) => {
    const files = event.target.files;
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const transaction = db.transaction(['photos'], 'readwrite');
        const store = transaction.objectStore('photos');
        store.add({
          username: currentUser,
          src: e.target.result,
          date: new Date().toLocaleDateString()
        });
        transaction.oncomplete = () => loadPhotos();
      };
      reader.readAsDataURL(file);
    });
    event.target.value = '';
  });

  function saveEntry() {
    const date = document.getElementById('entryDate').value;
    const content = document.getElementById('entryContent').value.trim();
    if (!content) return alert('Please write something!');
    
    const transaction = db.transaction(['diaries'], 'readwrite');
    const store = transaction.objectStore('diaries');
    
    store.add({
      username: currentUser,
      date: date,
      content: content
    });

    transaction.oncomplete = () => {
      document.getElementById('entryContent').value = '';
      alert('Saved!');
      loadDiaries();
    };
  }

  function closeModal(modalId) {
    document.getElementById(modalId).classList.add('hidden');
  }

</script>
</body>
</html>
