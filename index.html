<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Vintage Journal</title>

<style>
:root {
  --paper-color: #f5f1e8;
  --ink-color: #3a3226;
  --dark-ink: #1a1612;
  --border-color: #c9c0b0;
  --old-text-color: #8b7355;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 40px 20px;
  font-family: 'Times New Roman', Times, serif;
  background-color: #e8e4dc;
  color: var(--ink-color);
  min-height: 100vh;
}

.hidden {
  display: none !important;
}

/* ===== 登录页 ===== */
.auth-container {
  max-width: 450px;
  margin: 80px auto;
  background: var(--paper-color);
  border: 1px solid var(--border-color);
  padding: 50px 40px;
  text-align: center;
}

.auth-title {
  font-family: 'Courier New', monospace;
  font-size: 2.2em;
  letter-spacing: 6px;
  text-transform: uppercase;
}

.auth-form input {
  width: 100%;
  padding: 15px;
  margin-bottom: 20px;
  background: #fffdf7;
  border: 2px dashed var(--border-color);
  font-family: 'Courier New', monospace;
  font-size: 1.1em;
}

.auth-btn {
  width: 100%;
  padding: 18px;
  background: var(--dark-ink);
  color: var(--paper-color);
  border: none;
  font-family: 'Courier New', monospace;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
}

/* ===== 主界面 ===== */
.main-wrapper {
  max-width: 1200px;
  margin: auto;
}

.header {
  text-align: center;
  position: relative;
  margin-bottom: 40px;
}

.header h1 {
  font-family: 'Courier New', monospace;
  letter-spacing: 8px;
  text-transform: uppercase;
}

.user-info {
  position: absolute;
  right: 10px;
  top: 10px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
}

.backup-btn, .logout-btn {
  margin-left: 10px;
  padding: 5px 10px;
  cursor: pointer;
  font-family: 'Courier New';
}

.backup-btn {
  background: #555;
  color: white;
  border: none;
}

.logout-btn {
  background: none;
  border: 1px solid #aaa;
}

/* ===== Dashboard ===== */
.dashboard {
  display: flex;
  justify-content: center;
  gap: 60px;
  padding: 40px;
  background: var(--paper-color);
  border: 1px solid var(--border-color);
}

.dashboard-card {
  width: 280px;
  height: 360px;
  perspective: 1000px;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s;
}

.dashboard-card:hover .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border: 2px solid var(--border-color);
  background: #fffdf7;
}

.card-front {
  font-family: 'Courier New', monospace;
  font-size: 2em;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.card-back {
  transform: rotateY(180deg);
  padding: 20px;
  font-size: 1.1em;
}

/* ===== 编辑器 ===== */
.editor-page {
  background: var(--paper-color);
  padding: 40px;
  border: 1px solid var(--border-color);
}

textarea, input[type="date"] {
  width: 100%;
  padding: 15px;
  background: #fffdf7;
  border: 2px dashed var(--border-color);
  font-family: inherit;
  font-size: 1.1em;
}

textarea {
  height: 300px;
  resize: vertical;
}

.btn-save {
  background: #3a3226;
  color: #f5f1e8;
  border: none;
  padding: 15px 40px;
  font-family: 'Courier New', monospace;
  text-transform: uppercase;
  cursor: pointer;
}

/* ===== Memories ===== */
.memories-page {
  background: var(--paper-color);
  padding: 40px;
  border: 1px solid var(--border-color);
}

.timeline-item {
  padding: 15px;
  border-bottom: 1px dotted var(--border-color);
  cursor: pointer;
}

.timeline-date {
  font-family: 'Courier New', monospace;
  font-weight: bold;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 15px;
}

.gallery-img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border: 1px solid var(--border-color);
}
</style>
</head>

<body>

<!-- ===== 登录页 ===== -->
<div id="authPage">
  <div class="auth-container">
    <div class="auth-title">Journal</div>
    <form class="auth-form" onsubmit="login(event)">
      <input id="username" placeholder="Username" required>
      <input id="password" type="password" placeholder="Password" required>
      <button class="auth-btn" type="submit">Sign In</button>
    </form>
  </div>
</div>

<!-- ===== 主应用 ===== -->
<div id="mainApp" class="main-wrapper hidden">
  <div class="header">
    <div class="user-info">
      Welcome, <strong id="currentUser"></strong>
      <button class="backup-btn" onclick="exportData()">Export</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="backup-btn" onclick="document.getElementById('importFile').click()">Import</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <h1>Vintage Journal</h1>
  </div>

  <div class="dashboard">
    <div class="dashboard-card" onclick="showPage('editorPage')">
      <div class="card-inner">
        <div class="card-front">New Diary</div>
        <div class="card-back">Write today's story</div>
      </div>
    </div>

    <div class="dashboard-card" onclick="showPage('memoriesPage')">
      <div class="card-inner">
        <div class="card-front">Memories</div>
        <div class="card-back">Browse past entries</div>
      </div>
    </div>
  </div>

  <!-- 新建日记 -->
  <div id="editorPage" class="editor-page hidden">
    <textarea id="entryContent" placeholder="Write your diary..."></textarea>
    <button class="btn-save" onclick="saveEntry()">Save Entry</button>
  </div>

  <!-- Memories -->
  <div id="memoriesPage" class="memories-page hidden">
    <div id="diaryTimeline"></div>
    <div class="gallery-grid" id="photoGallery"></div>
  </div>
</div>

<script>
// ===== 登录 =====
function login(e) {
  e.preventDefault();
  const user = document.getElementById('username').value;
  localStorage.setItem('journal_currentUser', user);
  location.reload();
}

// ===== 初始化 =====
const currentUser = localStorage.getItem('journal_currentUser');

if (!currentUser) {
  document.getElementById('authPage').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
} else {
  document.getElementById('authPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('currentUser').textContent = currentUser;
}

// ===== 页面切换 =====
function showPage(id) {
  document.querySelectorAll('.editor-page, .memories-page').forEach(p => p.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ===== 日记 =====
function saveEntry() {
  const content = document.getElementById('entryContent').value;
  if (!content) return alert('Please write something');
  const diaries = JSON.parse(localStorage.getItem('diaries_' + currentUser) || '[]');
  diaries.unshift({ date: new Date().toLocaleDateString(), content });
  localStorage.setItem('diaries_' + currentUser, JSON.stringify(diaries));
  alert('Saved!');
}

// ===== 导出 =====
function exportData() {
  const data = {
    user: currentUser,
    diaries: JSON.parse(localStorage.getItem('diaries_' + currentUser) || '[]'),
    photos: JSON.parse(localStorage.getItem('photos_' + currentUser) || '[]')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `journal_backup_${currentUser}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== 导入 =====
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const data = JSON.parse(e.target.result);
    localStorage.setItem('diaries_' + currentUser, JSON.stringify(data.diaries || []));
    localStorage.setItem('photos_' + currentUser, JSON.stringify(data.photos || []));
    alert('Import successful!');
    location.reload();
  };
  reader.readAsText(file);
}

// ===== 退出 =====
function logout() {
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
